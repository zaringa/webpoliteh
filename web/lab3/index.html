<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Лабораторная 3 | Онлайн-библиотека</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              display: ['"Manrope"', 'sans-serif'],
            },
            boxShadow: {
              soft: '0 24px 46px -30px rgba(15, 23, 42, 0.58)',
            },
            colors: {
              accent: {
                50: '#fff4eb',
                100: '#ffe5d2',
                500: '#f97316',
                700: '#c2410c',
              },
            },
          },
        },
      };
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="min-h-screen bg-slate-100 font-display text-slate-900">
    <div class="pointer-events-none fixed inset-0 -z-10 overflow-hidden">
      <div class="absolute -left-16 top-0 h-72 w-72 rounded-full bg-cyan-300/35 blur-3xl"></div>
      <div class="absolute right-0 top-1/4 h-96 w-96 rounded-full bg-orange-200/45 blur-3xl"></div>
      <div class="absolute bottom-0 left-1/3 h-80 w-80 rounded-full bg-emerald-200/40 blur-3xl"></div>
    </div>

    <main class="mx-auto w-full max-w-6xl px-4 py-10 md:px-8">
      <section class="overflow-hidden rounded-3xl border border-slate-200/80 bg-white/90 shadow-soft backdrop-blur">
        <header class="border-b border-slate-200/80 p-6 md:p-8">
          <p class="inline-flex rounded-full bg-accent-50 px-3 py-1 text-xs font-bold uppercase tracking-[0.14em] text-accent-700">
            Лабораторная работа №3
          </p>

          <div class="mt-4 flex flex-col gap-6 md:flex-row md:items-end md:justify-between">
            <div class="max-w-2xl">
              <h1 class="text-3xl font-extrabold leading-tight md:text-4xl">Каталог онлайн-библиотеки</h1>
              <p class="mt-3 text-sm text-slate-600 md:text-base">
                Загрузка списка книг имитируется с сервера. Используйте фильтр по статусу, чтобы отобразить только доступные или выданные книги.
              </p>
            </div>

            <div class="space-y-3">
              <p class="text-xs font-bold uppercase tracking-[0.12em] text-slate-500">Фильтр по наличию</p>
              <div id="filter-controls" class="flex flex-wrap gap-2" role="tablist" aria-label="Фильтр книг"></div>
            </div>
          </div>

          <div class="mt-6 grid gap-3 sm:grid-cols-3">
            <article class="rounded-2xl border border-slate-200 bg-slate-50/80 p-4">
              <p class="text-xs uppercase tracking-[0.1em] text-slate-500">Всего книг</p>
              <p id="count-all" class="mt-1 text-2xl font-extrabold">0</p>
            </article>
            <article class="rounded-2xl border border-emerald-200 bg-emerald-50/70 p-4">
              <p class="text-xs uppercase tracking-[0.1em] text-emerald-700">Доступно</p>
              <p id="count-available" class="mt-1 text-2xl font-extrabold text-emerald-700">0</p>
            </article>
            <article class="rounded-2xl border border-orange-200 bg-orange-50/70 p-4">
              <p class="text-xs uppercase tracking-[0.1em] text-orange-700">Выдано</p>
              <p id="count-unavailable" class="mt-1 text-2xl font-extrabold text-orange-700">0</p>
            </article>
          </div>
        </header>

        <section class="p-6 md:p-8">
          <div id="status-box" class="rounded-2xl border border-slate-200 bg-slate-50 p-5 text-slate-700" aria-live="polite"></div>
          <ul id="books-list" class="mt-6 grid gap-4 sm:grid-cols-2 xl:grid-cols-3" aria-live="polite"></ul>
        </section>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
