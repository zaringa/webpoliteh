<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Лабораторная 6 | Таблица оценок</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              display: ['"Sora"', 'sans-serif'],
            },
            boxShadow: {
              soft: '0 30px 56px -36px rgba(15, 23, 42, 0.75)',
            },
          },
        },
      };
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <style>
      [v-cloak] {
        display: none;
      }

      .grade-cell {
        --spot-x: 50%;
        --spot-y: 50%;
        position: relative;
        isolation: isolate;
        overflow: hidden;
      }

      .grade-cell::before {
        content: "";
        position: absolute;
        inset: 0;
        background: radial-gradient(
          circle at var(--spot-x) var(--spot-y),
          rgba(56, 189, 248, 0.42),
          transparent 64%
        );
        opacity: 0;
        transition: opacity 180ms ease;
        z-index: 0;
      }

      .grade-cell:hover::before,
      .grade-cell:focus-visible::before {
        opacity: 1;
      }

      .grade-cell > span {
        position: relative;
        z-index: 1;
      }

      .progress-ring {
        transition: stroke-dashoffset 700ms cubic-bezier(0.22, 1, 0.36, 1);
      }

      .score-row {
        transition: background-color 220ms ease, border-color 220ms ease;
      }

      .score-row:hover {
        background-color: rgba(15, 23, 42, 0.75);
      }

      .row-move {
        transition: transform 560ms cubic-bezier(0.22, 1, 0.36, 1);
      }
    </style>
  </head>

  <body class="min-h-screen bg-slate-950 font-display text-slate-100">
    <div class="pointer-events-none fixed inset-0 -z-10 overflow-hidden">
      <div class="absolute -left-24 top-0 h-96 w-96 rounded-full bg-cyan-500/20 blur-3xl"></div>
      <div class="absolute right-0 top-16 h-[28rem] w-[28rem] rounded-full bg-blue-500/25 blur-3xl"></div>
      <div class="absolute bottom-0 left-1/3 h-80 w-80 rounded-full bg-emerald-500/20 blur-3xl"></div>
    </div>

    <div id="app" v-cloak>
      <main class="mx-auto w-full max-w-7xl px-4 py-10 md:px-8">
        <section class="overflow-hidden rounded-3xl border border-slate-800/90 bg-slate-900/85 shadow-soft backdrop-blur">
          <header class="border-b border-slate-800 px-6 py-7 md:px-8">
            <p class="inline-flex rounded-full border border-cyan-300/40 bg-cyan-500/10 px-3 py-1 text-xs font-bold uppercase tracking-[0.14em] text-cyan-200">
              Лабораторная работа №6
            </p>
              <summary-cards
              class="mt-6"
              :students-total="studentsTotal"
              :class-average="classAverageText"
              :top-student="topStudentLabel"
            ></summary-cards>
          </header>

          <section class="px-6 py-6 md:px-8">
            <div class="mb-5 flex flex-col gap-4 md:flex-row md:items-center md:justify-between">
              <sort-controls
                :active-sort="activeSort"
                @change-sort="applySort"
              ></sort-controls>

              <p class="text-sm font-medium text-slate-300">{{ reorderStatus }}</p>
            </div>

            <score-table
              :students="students"
              :subjects="subjects"
              :animate-rings="animateRings"
            ></score-table>
          </section>
        </section>
      </main>
    </div>

    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <script src="script.js"></script>
  </body>
</html>
