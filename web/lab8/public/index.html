<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Лабораторная 8 | Авторизация JWT</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              display: ['"Onest"', 'sans-serif'],
            },
          },
        },
      };
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Onest:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
  </head>

  <body class="min-h-screen bg-slate-950 font-display text-slate-100">
    <main class="mx-auto w-full max-w-lg px-4 py-10">
      <section class="rounded-3xl border border-slate-800 bg-slate-900/90 p-6 md:p-7">
        <header class="border-b border-slate-800 pb-5">
          <p class="inline-flex rounded-full border border-cyan-400/40 bg-cyan-500/10 px-3 py-1 text-xs font-bold uppercase tracking-[0.12em] text-cyan-200">
            Лабораторная работа №8
          </p>
          <h1 class="mt-4 text-2xl font-extrabold md:text-3xl">Личный кабинет студента</h1>
          <p class="mt-2 text-sm text-slate-300">Регистрация и вход с JWT-защитой маршрутов.</p>
        </header>

        <section id="auth-view" class="mt-6">
          <div class="mb-4 flex gap-2">
            <button
              id="mode-login-btn"
              type="button"
              class="rounded-full border border-cyan-300/50 bg-cyan-500/20 px-4 py-2 text-sm font-bold text-cyan-100"
            >
              Вход
            </button>
            <button
              id="mode-register-btn"
              type="button"
              class="rounded-full border border-slate-700 bg-slate-800 px-4 py-2 text-sm font-bold text-slate-200"
            >
              Регистрация
            </button>
          </div>

          <form id="auth-form" class="space-y-3" novalidate>
            <label id="full-name-wrap" class="hidden block">
              <span class="mb-1 block text-sm font-semibold text-slate-200">ФИО</span>
              <input
                id="full-name-input"
                type="text"
                class="w-full rounded-xl border border-slate-700 bg-slate-800 px-4 py-3 text-sm text-slate-100 outline-none transition focus:border-cyan-400"
                placeholder="Иванов Иван"
              />
            </label>

            <label class="block">
              <span class="mb-1 block text-sm font-semibold text-slate-200">Email</span>
              <input
                id="email-input"
                type="email"
                class="w-full rounded-xl border border-slate-700 bg-slate-800 px-4 py-3 text-sm text-slate-100 outline-none transition focus:border-cyan-400"
                placeholder="student@example.com"
                required
              />
            </label>

            <label class="block">
              <span class="mb-1 block text-sm font-semibold text-slate-200">Пароль</span>
              <input
                id="password-input"
                type="password"
                class="w-full rounded-xl border border-slate-700 bg-slate-800 px-4 py-3 text-sm text-slate-100 outline-none transition focus:border-cyan-400"
                placeholder="Минимум 6 символов"
                required
              />
            </label>

            <button
              id="submit-btn"
              type="submit"
              class="w-full rounded-full bg-cyan-400 px-4 py-2.5 text-sm font-extrabold text-slate-950 transition hover:bg-cyan-300"
            >
              Войти
            </button>
          </form>
        </section>

        <section id="dashboard-view" class="mt-6 hidden">
          <article class="rounded-2xl border border-slate-700 bg-slate-800/70 p-4">
            <p class="text-xs uppercase tracking-[0.1em] text-slate-400">Профиль</p>
            <p id="welcome-text" class="mt-2 text-base font-bold text-slate-100">-</p>
            <p id="email-text" class="mt-1 text-sm text-slate-300">-</p>
          </article>

          <article class="mt-3 rounded-2xl border border-slate-700 bg-slate-800/70 p-4">
            <p class="text-xs uppercase tracking-[0.1em] text-slate-400">Защищенный маршрут</p>
            <p id="protected-text" class="mt-2 text-sm text-slate-200">-</p>
          </article>

          <div class="mt-4 flex flex-wrap gap-2">
            <button
              id="refresh-btn"
              type="button"
              class="rounded-full border border-slate-600 bg-slate-800 px-4 py-2 text-sm font-bold text-slate-100 transition hover:border-slate-400"
            >
              Обновить данные
            </button>
            <button
              id="logout-btn"
              type="button"
              class="rounded-full border border-rose-400 bg-rose-500 px-4 py-2 text-sm font-bold text-white transition hover:bg-rose-400"
            >
              Выйти
            </button>
          </div>
        </section>

        <p id="status-text" class="mt-5 text-sm font-medium text-slate-300" aria-live="polite"></p>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
